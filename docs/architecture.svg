<svg width="800" viewBox="0 0 800 660" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="660" fill="#0f1e30"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#dff0f8">Dwellera — System Architecture</text>

  <!-- USER -->
  <rect x="310" y="50" width="180" height="48" rx="8" fill="#1e3a56" stroke="#38bdf8" stroke-width="1"/>
  <text x="400" y="79" text-anchor="middle" font-size="14" font-weight="500" fill="#dff0f8">User / Browser</text>

  <!-- Arrow: user -> frontend -->
  <line x1="400" y1="98" x2="400" y2="138" stroke="#6a97b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="122" font-size="11" fill="#6a97b8">HTTPS</text>

