  <rect x="42" y="524" width="220" height="96" rx="8" fill="#1f1520" stroke="#fb7185" stroke-width="1"/>
  <text x="152" y="556" text-anchor="middle" font-size="14" font-weight="500" fill="#fca5a5">Supabase</text>
  <text x="152" y="576" text-anchor="middle" font-size="12" fill="#c07080">PostgreSQL database</text>
  <text x="152" y="594" text-anchor="middle" font-size="12" fill="#c07080">Row level security</text>

  <rect x="290" y="524" width="220" height="96" rx="8" fill="#1f1520" stroke="#fb7185" stroke-width="1"/>
  <text x="400" y="556" text-anchor="middle" font-size="14" font-weight="500" fill="#fca5a5">Supabase Realtime</text>
  <text x="400" y="576" text-anchor="middle" font-size="12" fill="#c07080">Broadcast channels</text>
  <text x="400" y="594" text-anchor="middle" font-size="12" fill="#c07080">WebSocket events</text>

  <rect x="538" y="524" width="220" height="96" rx="8" fill="#1a1a10" stroke="#fbbf24" stroke-width="1"/>
  <text x="648" y="556" text-anchor="middle" font-size="14" font-weight="500" fill="#fde68a">Cloudinary</text>
  <text x="648" y="576" text-anchor="middle" font-size="12" fill="#c09a40">Image CDN</text>
  <text x="648" y="594" text-anchor="middle" font-size="12" fill="#c09a40">Auto-optimize delivery</text>

  <!-- Legend -->
  <rect x="42" y="634" width="12" height="12" rx="2" fill="#1e2e52" stroke="#7c6af7" stroke-width="1"/>
  <text x="60" y="644" font-size="11" fill="#6a97b8">Frontend</text>
  <rect x="140" y="634" width="12" height="12" rx="2" fill="#0f2e20" stroke="#34d399" stroke-width="1"/>
  <text x="158" y="644" font-size="11" fill="#6a97b8">Backend</text>
  <rect x="232" y="634" width="12" height="12" rx="2" fill="#1f1520" stroke="#fb7185" stroke-width="1"/>
  <text x="250" y="644" font-size="11" fill="#6a97b8">Database / Realtime</text>
  <rect x="374" y="634" width="12" height="12" rx="2" fill="#1a1a10" stroke="#fbbf24" stroke-width="1"/>
  <text x="392" y="644" font-size="11" fill="#6a97b8">External API</text>
