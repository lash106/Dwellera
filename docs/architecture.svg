  <text x="158" y="240" text-anchor="middle" font-size="12" fill="#8878cc">CartoDB base maps</text>

  <rect x="304" y="168" width="192" height="96" rx="8" fill="#1e2e52" stroke="#7c6af7" stroke-width="1"/>
  <text x="400" y="202" text-anchor="middle" font-size="14" font-weight="500" fill="#c5bbff">Real-time Chat</text>
  <text x="400" y="222" text-anchor="middle" font-size="12" fill="#8878cc">Supabase broadcast</text>
  <text x="400" y="240" text-anchor="middle" font-size="12" fill="#8878cc">WebSocket sync</text>

  <rect x="546" y="168" width="192" height="96" rx="8" fill="#1e2e52" stroke="#7c6af7" stroke-width="1"/>
