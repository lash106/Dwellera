  <text x="642" y="392" text-anchor="middle" font-size="14" font-weight="500" fill="#86efcc">Image Upload</text>
  <text x="642" y="412" text-anchor="middle" font-size="12" fill="#4da87c">Cloudinary API</text>
  <text x="642" y="430" text-anchor="middle" font-size="12" fill="#4da87c">Drag-and-drop</text>

  <!-- Arrows: backend -> external services -->
  <line x1="158" y1="474" x2="158" y2="524" stroke="#6a97b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="474" x2="400" y2="524" stroke="#6a97b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="642" y1="474" x2="642" y2="524" stroke="#6a97b8" stroke-width="1.5" marker-end="url(#arrow)"/>

