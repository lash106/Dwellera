  <rect x="40" y="138" width="720" height="148" rx="12" fill="#1a2a45" stroke="#7c6af7" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="55" y="160" font-size="11" fill="#9f8ffa">Frontend — Next.js 18 · TypeScript · Tailwind CSS</text>

  <!-- Frontend boxes -->
  <rect x="62" y="168" width="192" height="96" rx="8" fill="#1e2e52" stroke="#7c6af7" stroke-width="1"/>
